<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Advanced Drawing Board</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:linear-gradient(135deg,#1f4037,#99f2c8);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

canvas{
border:2px solid #444;
border-radius:10px;
touch-action:none;
cursor:crosshair;
}

.controls button{
margin:3px;
}

</style>
</head>

<body>

<div class="box">

<h3>🎨 Advanced Drawing Board</h3>

<div class="controls mb-2">

<input type="color" id="color">

<input type="range" id="size" min="1" max="25" value="5">

<select id="tool" class="form-select-sm">
<option value="brush">Brush</option>
<option value="line">Line</option>
<option value="circle">Circle</option>
<option value="rect">Square</option>
</select>

<button class="btn btn-primary btn-sm" onclick="undo()">Undo</button>
<button class="btn btn-warning btn-sm" onclick="redo()">Redo</button>
<button class="btn btn-danger btn-sm" onclick="clearCanvas()">Clear</button>
<button class="btn btn-success btn-sm" onclick="download()">Download</button>

</div>

<canvas id="canvas" width="600" height="400"></canvas>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let drawing=false
let startX,startY

let history=[]
let redoStack=[]

function saveState(){
history.push(canvas.toDataURL())
}

function undo(){
if(history.length>0){
redoStack.push(history.pop())
let img=new Image()
img.src=history[history.length-1]
img.onload=()=>ctx.drawImage(img,0,0)
}
}

function redo(){
if(redoStack.length>0){
let img=new Image()
img.src=redoStack.pop()
img.onload=()=>ctx.drawImage(img,0,0)
}
}

canvas.addEventListener("mousedown",start)
canvas.addEventListener("mouseup",end)
canvas.addEventListener("mousemove",draw)

canvas.addEventListener("touchstart",e=>start(e.touches[0]))
canvas.addEventListener("touchend",end)
canvas.addEventListener("touchmove",e=>{
draw(e.touches[0])
e.preventDefault()
})

function start(e){

drawing=true
startX=e.offsetX
startY=e.offsetY
saveState()

}

function end(){
drawing=false
ctx.beginPath()
}

function draw(e){

if(!drawing) return

let tool=document.getElementById("tool").value

ctx.lineWidth=document.getElementById("size").value
ctx.strokeStyle=document.getElementById("color").value

ctx.shadowBlur=10
ctx.shadowColor=document.getElementById("color").value

if(tool=="brush"){

ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()
ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)

}

if(tool=="line"){

ctx.clearRect(0,0,canvas.width,canvas.height)
restore()
ctx.beginPath()
ctx.moveTo(startX,startY)
ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()

}

if(tool=="rect"){

ctx.clearRect(0,0,canvas.width,canvas.height)
restore()
ctx.strokeRect(startX,startY,e.offsetX-startX,e.offsetY-startY)

}

if(tool=="circle"){

ctx.clearRect(0,0,canvas.width,canvas.height)
restore()

let radius=Math.sqrt((e.offsetX-startX)**2+(e.offsetY-startY)**2)

ctx.beginPath()
ctx.arc(startX,startY,radius,0,Math.PI*2)
ctx.stroke()

}

}

function restore(){

if(history.length>0){
let img=new Image()
img.src=history[history.length-1]
img.onload=()=>ctx.drawImage(img,0,0)
}

}

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height)
history=[]
redoStack=[]
}

function download(){

let link=document.createElement("a")
link.download="drawing.png"
link.href=canvas.toDataURL()
link.click()

}

</script>

</body>
</html>
