<!DOCTYPE html>
<html lang="en">
<head>
    <title>Holi Celebration Invitation</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: linear-gradient(45deg,#ff0080,#ffbf00,#00f2ff,#00ff88);
    background-size:400% 400%;
    animation: gradientBG 8s ease infinite;
    z-index:-2;
}

@keyframes gradientBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Card Design */
.card{
    width:400px;
    border-radius:25px;
    padding:25px;
    text-align:center;
    background:rgba(255,255,255,0.95);
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    position:relative;
    z-index:2;
}

.card h1{
    font-size:28px;
    font-weight:bold;
    color:#ff0080;
}

.custom-btn{
    background:#ff0080;
    color:white;
    border-radius:30px;
    padding:8px 20px;
    border:none;
    transition:0.3s;
}

.custom-btn:hover{
    background:#ffbf00;
    color:black;
}

/* Splash Effect */
.splash{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    animation: splash 2s linear forwards;
}

@keyframes splash{
    0%{transform:scale(1); opacity:1;}
    100%{transform:scale(15); opacity:0;}
}

/* Mobile Responsive */
@media(max-width:500px){
    .card{
        width:90%;
        padding:15px;
    }
    .card h1{
        font-size:22px;
    }
}

.hidden-msg{
    display:none;
    margin-top:15px;
    font-weight:bold;
    color:#0077ff;
}

</style>
</head>
<body>

<div class="card">
    <h1>🌈 Grand Holi Celebration 2026 🌈</h1>
    <p>Celebrate the festival of colors with joy & happiness!</p>

    <input type="text" id="nameInput" class="form-control mt-2" placeholder="Enter Your Name">

    <p class="mt-3"><b>Date:</b> 25 March 2026</p>
    <p><b>Time:</b> 10:00 AM</p>
    <p><b>Venue:</b> My Home</p>

    <button class="custom-btn mt-3" id="inviteBtn">Get Invitation 🎉</button>

    <div class="hidden-msg" id="customMsg"></div>

    <!-- Music -->
    <audio id="holiMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<script>

$(document).ready(function(){

    $("#inviteBtn").click(function(){

        let name = $("#nameInput").val();

        if(name === ""){
            alert("Please enter your name 😊");
            return;
        }

        $("#customMsg").html("🎊 Dear " + name + ", You are warmly invited to our Holi Party! 🎊").fadeIn(1000);

        // Play Music
        $("#holiMusic")[0].play();

        // Color Splash Animation
        for(let i=0; i<10; i++){
            let splash = $("<div class='splash'></div>");
            let colors = ["red","yellow","blue","green","pink","orange"];
            splash.css({
                top: Math.random()*window.innerHeight,
                left: Math.random()*window.innerWidth,
                background: colors[Math.floor(Math.random()*colors.length)]
            });
            $("body").append(splash);

            setTimeout(function(){
                splash.remove();
            },2000);
        }

    });

});

</script>

</body>
</html>
