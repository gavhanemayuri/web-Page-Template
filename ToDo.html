<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Smart To-Do App</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#667eea;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5568d8;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin-bottom:10px;
border-radius:6px;
background:#f4f4f4;
}

.priority{
font-size:12px;
padding:4px 8px;
border-radius:4px;
color:white;
margin-left:10px;
}

.high{background:red;}
.medium{background:orange;}
.low{background:green;}

.completed{
text-decoration:line-through;
color:gray;
}

.delete{
background:red;
border:none;
color:white;
padding:5px 8px;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>🤖 AI Smart To-Do</h2>

<div class="input-box">
<input id="taskInput" placeholder="Enter your task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function aiPriority(text){

text=text.toLowerCase();

if(text.includes("exam") || text.includes("interview") || text.includes("submit") || text.includes("urgent")){
return "high";
}

if(text.includes("study") || text.includes("practice") || text.includes("meeting")){
return "medium";
}

return "low";
}

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function renderTasks(){

let list=document.getElementById("taskList");
list.innerHTML="";

tasks.forEach((task,index)=>{

let li=document.createElement("li");

if(task.completed){
li.classList.add("completed");
}

li.innerHTML=`
<span onclick="toggleTask(${index})">
${task.text}
<span class="priority ${task.priority}">
${task.priority.toUpperCase()}
</span>
</span>

<button class="delete" onclick="deleteTask(${index})">X</button>
`;

list.appendChild(li);

});

}

function addTask(){

let input=document.getElementById("taskInput");
let text=input.value.trim();

if(text==="") return;

let priority=aiPriority(text);

tasks.push({
text:text,
priority:priority,
completed:false
});

input.value="";

saveTasks();
renderTasks();

}

function toggleTask(index){

tasks[index].completed=!tasks[index].completed;

saveTasks();
renderTasks();

}

function deleteTask(index){

tasks.splice(index,1);

saveTasks();
renderTasks();

}

renderTasks();

</script>

</body>
</html>
