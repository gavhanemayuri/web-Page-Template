<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Book Store</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

body{
background:linear-gradient(135deg,#0f2027,#2c5364);
font-family:Arial;
color:white;
}

.card{
border-radius:15px;
transition:0.4s;
overflow:hidden;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.card img{
height:200px;
object-fit:cover;
}

.star{
font-size:20px;
cursor:pointer;
color:gray;
}

.star.active{
color:gold;
}

.cart-box{
position:fixed;
right:20px;
top:80px;
width:230px;
background:white;
color:black;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.book-title{
font-weight:bold;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<h4 class="text-white">📚 Advanced Book Store</h4>

<input id="search" class="form-control w-50" placeholder="Search books">

</div>
</nav>

<div class="container mt-4">
<div class="row" id="books">

<!-- Book 1 -->
<div class="col-md-4 mb-4 book">
<div class="card bg-light text-dark">
<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
<div class="card-body">
<div class="book-title">Java Programming</div>
<p>₹499</p>

<div class="rating">
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
</div>

<button class="btn btn-primary mt-2" onclick="addCart('Java Programming')">Add Cart</button>
<button class="btn btn-info mt-2" onclick="details('Java Programming','Complete Java guide.')">Details</button>

</div>
</div>
</div>

<!-- Book 2 -->
<div class="col-md-4 mb-4 book">
<div class="card bg-light text-dark">
<img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d">
<div class="card-body">
<div class="book-title">Web Development</div>
<p>₹399</p>

<div>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
</div>

<button class="btn btn-primary mt-2" onclick="addCart('Web Development')">Add Cart</button>
<button class="btn btn-info mt-2" onclick="details('Web Development','HTML CSS JS complete course.')">Details</button>

</div>
</div>
</div>

<!-- Book 3 -->
<div class="col-md-4 mb-4 book">
<div class="card bg-light text-dark">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f">
<div class="card-body">
<div class="book-title">Data Science</div>
<p>₹599</p>

<div>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
</div>

<button class="btn btn-primary mt-2" onclick="addCart('Data Science')">Add Cart</button>
<button class="btn btn-info mt-2" onclick="details('Data Science','Start your Data Science career.')">Details</button>

</div>
</div>
</div>

<!-- More Books -->

<div class="col-md-4 mb-4 book">
<div class="card bg-light text-dark">
<img src="https://images.unsplash.com/photo-1473755504818-b72b6dfdc226">
<div class="card-body">
<div class="book-title">Python Programming</div>
<p>₹450</p>
<button class="btn btn-primary" onclick="addCart('Python Programming')">Add Cart</button>
<button class="btn btn-info" onclick="details('Python Programming','Learn Python easily.')">Details</button>
</div>
</div>
</div>

<div class="col-md-4 mb-4 book">
<div class="card bg-light text-dark">
<img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
<div class="card-body">
<div class="book-title">Machine Learning</div>
<p>₹650</p>
<button class="btn btn-primary" onclick="addCart('Machine Learning')">Add Cart</button>
<button class="btn btn-info" onclick="details('Machine Learning','AI and ML basics.')">Details</button>
</div>
</div>
</div>

<div class="col-md-4 mb-4 book">
<div class="card bg-light text-dark">
<img src="https://images.unsplash.com/photo-1497633762265-9d179a990aa6">
<div class="card-body">
<div class="book-title">SQL Guide</div>
<p>₹300</p>
<button class="btn btn-primary" onclick="addCart('SQL Guide')">Add Cart</button>
<button class="btn btn-info" onclick="details('SQL Guide','Master SQL queries.')">Details</button>
</div>
</div>
</div>

</div>
</div>

<div class="cart-box">
<h5>🛒 Cart</h5>
<ul id="cart"></ul>
<button class="btn btn-success btn-sm" onclick="checkout()">Checkout</button>
</div>

<div class="modal fade" id="modal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 id="title"></h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<p id="desc"></p>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[]
displayCart()

function addCart(book){
cart.push(book)
localStorage.setItem("cart",JSON.stringify(cart))
displayCart()
}

function displayCart(){
let list=document.getElementById("cart")
list.innerHTML=""
cart.forEach(b=>{
let li=document.createElement("li")
li.innerText=b
list.appendChild(li)
})
}

function checkout(){
alert("Checkout Successful 🎉")
cart=[]
localStorage.removeItem("cart")
displayCart()
}

function details(title,desc){
document.getElementById("title").innerText=title
document.getElementById("desc").innerText=desc
new bootstrap.Modal(document.getElementById("modal")).show()
}

function rate(star){
let stars=star.parentElement.children
for(let i=0;i<stars.length;i++) stars[i].classList.remove("active")
star.classList.add("active")
}

document.getElementById("search").addEventListener("keyup",function(){
let value=this.value.toLowerCase()
document.querySelectorAll(".book").forEach(b=>{
b.style.display=b.innerText.toLowerCase().includes(value)?"block":"none"
})
})

</script>

</body>
</html>
