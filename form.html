<!DOCTYPE html>
<html>
<head>
    <title>Login & Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 320px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .toggle {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            color: #667eea;
            font-size: 14px;
        }

        .message {
            text-align: center;
            font-size: 14px;
            margin-top: 8px;
        }

        .error { color: red; }
        .success { color: green; }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Login Form -->
    <div id="loginForm">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Enter Email">
        <input type="password" id="loginPassword" placeholder="Enter Password">
        <button onclick="login()">Login</button>
        <div class="toggle" onclick="showRegister()">Don't have an account? Register</div>
        <div class="message" id="loginMessage"></div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="hidden">
        <h2>Register</h2>
        <input type="text" id="regName" placeholder="Enter Name">
        <input type="email" id="regEmail" placeholder="Enter Email">
        <input type="password" id="regPassword" placeholder="Enter Password">
        <button onclick="register()">Register</button>
        <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
        <div class="message" id="registerMessage"></div>
    </div>

</div>

<script>
function showRegister() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

function register() {
    var name = document.getElementById("regName").value;
    var email = document.getElementById("regEmail").value;
    var password = document.getElementById("regPassword").value;
    var message = document.getElementById("registerMessage");

    if (name === "" || email === "" || password === "") {
        message.innerHTML = "Please fill all fields!";
        message.className = "message error";
        return;
    }

    var user = {
        name: name,
        email: email,
        password: password
    };

    localStorage.setItem("user", JSON.stringify(user));

    message.innerHTML = "Registration Successful!";
    message.className = "message success";

    setTimeout(showLogin, 1500);
}

function login() {
    var email = document.getElementById("loginEmail").value;
    var password = document.getElementById("loginPassword").value;
    var message = document.getElementById("loginMessage");

    var storedUser = JSON.parse(localStorage.getItem("user"));

    if (!storedUser) {
        message.innerHTML = "No user found! Please register.";
        message.className = "message error";
        return;
    }

    if (email === storedUser.email && password === storedUser.password) {
        message.innerHTML = "Login Successful!";
        message.className = "message success";
    } else {
        message.innerHTML = "Invalid Email or Password!";
        message.className = "message error";
    }
}
</script>

</body>
</html>
